<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ps-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F6D673"/>
      <stop offset="100%" stop-color="#D19E36"/>
    </linearGradient>
    <linearGradient id="ps-blue1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3F79FF"/>
      <stop offset="100%" stop-color="#1E3EA8"/>
    </linearGradient>
    <linearGradient id="ps-blue2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2E5BD6"/>
      <stop offset="100%" stop-color="#14265F"/>
    </linearGradient>
    <filter id="ps-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#0B0F1A" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- Back card (deep blue) -->
  <g transform="translate(512, 520) rotate(-15)" filter="url(#ps-shadow)">
    <rect x="-372" y="-236" width="744" height="472" rx="64" fill="url(#ps-blue2)"/>
  </g>

  <!-- Middle card (blue) -->
  <g transform="translate(512, 508) rotate(-6)" filter="url(#ps-shadow)">
    <rect x="-372" y="-236" width="744" height="472" rx="64" fill="url(#ps-blue1)"/>
    <rect x="-300" y="-150" width="96" height="70" rx="14" fill="#FFFFFF" opacity="0.28"/>
  </g>

  <!-- Front card (gold hero) -->
  <g transform="translate(512, 496) rotate(5)" filter="url(#ps-shadow)">
    <rect x="-372" y="-236" width="744" height="472" rx="64" fill="url(#ps-gold)"/>
    <!-- magnetic stripe -->
    <rect x="-372" y="-118" width="744" height="82" fill="#8A6A1E" opacity="0.55"/>
    <!-- EMV chip -->
    <rect x="-300" y="66" width="120" height="92" rx="16" fill="#B98E2C" opacity="0.85"/>
    <rect x="-268" y="90" width="56" height="44" rx="6" fill="#8A6A1E" opacity="0.5"/>
    <!-- contactless waves -->
    <g transform="translate(250, 92)" fill="none" stroke="#8A6A1E" stroke-opacity="0.6" stroke-width="10" stroke-linecap="round">
      <path d="M0,-40 C20,-20 20,20 0,40"/>
      <path d="M34,-58 C64,-28 64,28 34,58"/>
    </g>
    <!-- number dots -->
    <g fill="#8A6A1E" opacity="0.5">
      <circle cx="-150" cy="122" r="9"/><circle cx="-118" cy="122" r="9"/><circle cx="-86" cy="122" r="9"/>
      <circle cx="-42" cy="122" r="9"/><circle cx="-10" cy="122" r="9"/><circle cx="22" cy="122" r="9"/>
    </g>
  </g>

  <!-- Diamond sparkles -->
  <g>
    <g transform="translate(196, 176)">
      <polygon points="0,-62 32,0 0,62 -32,0" fill="#F6D673"/>
      <polygon points="0,-28 14,0 0,28 -14,0" fill="#FFFFFF" opacity="0.55"/>
    </g>
    <g transform="translate(858, 856)">
      <polygon points="0,-48 25,0 0,48 -25,0" fill="#F6D673" opacity="0.92"/>
      <polygon points="0,-20 10,0 0,20 -10,0" fill="#FFFFFF" opacity="0.5"/>
    </g>
  </g>
</svg>
