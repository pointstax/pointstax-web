<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="100%" stop-color="#E0F2FE"/>
    </linearGradient>
    <linearGradient id="c1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#BFDBFE"/>
      <stop offset="100%" stop-color="#93C5FD"/>
    </linearGradient>
    <linearGradient id="c2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="c3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1E40AF"/>
    </linearGradient>
    <filter id="shadow1">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#93C5FD" flood-opacity="0.3"/>
    </filter>
    <filter id="shadow2">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#3B82F6" flood-opacity="0.3"/>
    </filter>
    <filter id="shadow3">
      <feDropShadow dx="0" dy="14" stdDeviation="24" flood-color="#1D4ED8" flood-opacity="0.35"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="40%" stop-color="white" stop-opacity="0.2"/>
      <stop offset="60%" stop-color="white" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <!-- Back card -->
  <g transform="translate(512, 480) rotate(-12)">
    <rect x="-200" y="-126" width="400" height="252" rx="32" fill="url(#c1)" filter="url(#shadow1)"/>
    <rect x="-200" y="-126" width="400" height="252" rx="32" fill="none" stroke="#93C5FD" stroke-width="4" opacity="0.5" filter="url(#glow)"/>
  </g>

  <!-- Middle card -->
  <g transform="translate(512, 460) rotate(-5)">
    <rect x="-200" y="-126" width="400" height="252" rx="32" fill="url(#c2)" filter="url(#shadow2)"/>
    <rect x="-200" y="-126" width="400" height="252" rx="32" fill="none" stroke="#60A5FA" stroke-width="4" opacity="0.55" filter="url(#glow)"/>
    <!-- Chip -->
    <rect x="-155" y="-72" width="56" height="40" rx="8" fill="white" opacity="0.3"/>
  </g>

  <!-- Front card (hero) -->
  <g transform="translate(512, 440) rotate(2)">
    <rect x="-200" y="-126" width="400" height="252" rx="32" fill="url(#c3)" filter="url(#shadow3)"/>
    <rect x="-200" y="-126" width="400" height="252" rx="32" fill="none" stroke="#3B82F6" stroke-width="5" opacity="0.65" filter="url(#glow)"/>

    <!-- EMV Chip -->
    <rect x="-155" y="-72" width="64" height="48" rx="10" fill="white" opacity="0.42"/>
    <rect x="-139" y="-60" width="32" height="24" rx="4" fill="white" opacity="0.22"/>
    <line x1="-139" y1="-48" x2="-107" y2="-48" stroke="white" stroke-width="1" opacity="0.15"/>
    <line x1="-123" y1="-60" x2="-123" y2="-36" stroke="white" stroke-width="1" opacity="0.15"/>

    <!-- Contactless -->
    <g transform="translate(145, -80)" opacity="0.5">
      <path d="M0,0 C8,-8 8,-20 0,-28" fill="none" stroke="white" stroke-width="4" stroke-linecap="round"/>
      <path d="M8,4 C20,-8 20,-28 8,-36" fill="none" stroke="white" stroke-width="4" stroke-linecap="round"/>
      <path d="M16,8 C32,-8 32,-36 16,-44" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
    </g>

    <!-- Card number dots -->
    <g fill="white" opacity="0.35">
      <circle cx="-145" cy="52" r="5"/><circle cx="-127" cy="52" r="5"/><circle cx="-109" cy="52" r="5"/><circle cx="-91" cy="52" r="5"/>
      <circle cx="-63" cy="52" r="5"/><circle cx="-45" cy="52" r="5"/><circle cx="-27" cy="52" r="5"/><circle cx="-9" cy="52" r="5"/>
      <circle cx="19" cy="52" r="5"/><circle cx="37" cy="52" r="5"/><circle cx="55" cy="52" r="5"/><circle cx="73" cy="52" r="5"/>
      <circle cx="101" cy="52" r="5"/><circle cx="119" cy="52" r="5"/><circle cx="137" cy="52" r="5"/><circle cx="155" cy="52" r="5"/>
    </g>

    <!-- Name bar -->
    <rect x="-145" y="80" width="140" height="12" rx="6" fill="white" opacity="0.15"/>
    <rect x="-145" y="100" width="90" height="10" rx="5" fill="white" opacity="0.1"/>

    <!-- Network circles -->
    <circle cx="140" cy="100" r="20" fill="white" opacity="0.18"/>
    <circle cx="165" cy="100" r="20" fill="white" opacity="0.12"/>

    <!-- Shimmer overlay -->
    <clipPath id="cardClip"><rect x="-200" y="-126" width="400" height="252" rx="32"/></clipPath>
    <rect x="-200" y="-126" width="400" height="252" fill="url(#shimmer)" opacity="0.3" clip-path="url(#cardClip)"/>
  </g>

  <!-- Diamond points (static for icon) -->
  <g filter="url(#glow)">
    <g transform="translate(820, 260)">
      <polygon points="0,-22 11,0 0,22 -11,0" fill="#2563EB"/>
      <polygon points="0,-10 5,0 0,10 -5,0" fill="white" opacity="0.6"/>
    </g>
    <g transform="translate(180, 680)">
      <polygon points="0,-18 9,0 0,18 -9,0" fill="#3B82F6"/>
      <polygon points="0,-8 4,0 0,8 -4,0" fill="white" opacity="0.55"/>
    </g>
    <g transform="translate(830, 660)">
      <polygon points="0,-15 7.5,0 0,15 -7.5,0" fill="#60A5FA"/>
      <polygon points="0,-6 3,0 0,6 -3,0" fill="white" opacity="0.5"/>
    </g>
    <g transform="translate(200, 280)">
      <polygon points="0,-14 7,0 0,14 -7,0" fill="#93C5FD"/>
      <polygon points="0,-6 3,0 0,6 -3,0" fill="white" opacity="0.45"/>
    </g>
  </g>
</svg>
