<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="glow" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#E8BC4A" stop-opacity="0.20"/>
      <stop offset="55%" stop-color="#0B0F1A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#F6D673"/>
      <stop offset="1" stop-color="#D19E36"/>
    </linearGradient>
    <linearGradient id="blue1" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#3F79FF"/>
      <stop offset="1" stop-color="#1E3EA8"/>
    </linearGradient>
    <linearGradient id="blue2" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#2E5BD6"/>
      <stop offset="1" stop-color="#14265F"/>
    </linearGradient>
    <linearGradient id="head" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#F6D673"/>
      <stop offset="1" stop-color="#D19E36"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="16" stdDeviation="26" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Dark ground + gold glow -->
  <rect width="1200" height="630" fill="#0B0F1A"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- faint corner dots -->
  <g fill="#E8BC4A" opacity="0.16">
    <circle cx="100" cy="90" r="2.5"/><circle cx="220" cy="90" r="2.5"/><circle cx="340" cy="90" r="2.5"/>
    <circle cx="80" cy="315" r="2.5"/><circle cx="100" cy="540" r="2.5"/>
  </g>

  <!-- Card stack (right side) -->
  <g transform="translate(880 315)" filter="url(#shadow)">
    <g transform="rotate(-15)">
      <rect x="-190" y="-120" width="380" height="240" rx="30" fill="url(#blue2)"/>
    </g>
    <g transform="rotate(-6) translate(0 -10)">
      <rect x="-190" y="-120" width="380" height="240" rx="30" fill="url(#blue1)"/>
      <rect x="-150" y="-78" width="52" height="38" rx="8" fill="#FFFFFF" opacity="0.28"/>
    </g>
    <g transform="rotate(5) translate(0 -20)">
      <rect x="-190" y="-120" width="380" height="240" rx="30" fill="url(#gold)"/>
      <rect x="-190" y="-58" width="380" height="42" fill="#8A6A1E" opacity="0.55"/>
      <rect x="-150" y="36" width="60" height="46" rx="9" fill="#B98E2C" opacity="0.85"/>
      <g fill="#8A6A1E" opacity="0.5">
        <circle cx="-78" cy="62" r="5"/><circle cx="-62" cy="62" r="5"/><circle cx="-46" cy="62" r="5"/>
        <circle cx="-22" cy="62" r="5"/><circle cx="-6" cy="62" r="5"/><circle cx="10" cy="62" r="5"/>
      </g>
      <g transform="translate(130 44)" fill="none" stroke="#8A6A1E" stroke-opacity="0.6" stroke-width="6" stroke-linecap="round">
        <path d="M0,-22 C11,-11 11,11 0,22"/>
        <path d="M18,-32 C35,-16 35,16 18,32"/>
      </g>
    </g>
    <!-- diamonds -->
    <g fill="#F6D673">
      <g transform="translate(-150 -170)"><polygon points="0,-26 13,0 0,26 -13,0"/></g>
      <g transform="translate(175 165)" opacity="0.9"><polygon points="0,-20 10,0 0,20 -10,0"/></g>
    </g>
  </g>

  <!-- Text block (left) -->
  <g transform="translate(80 210)">
    <g>
      <rect width="230" height="44" rx="22" fill="none" stroke="#E8BC4A" stroke-opacity="0.4"/>
      <circle cx="28" cy="22" r="5" fill="#10B981"/>
      <text x="48" y="29" font-family="'Geist Mono', ui-monospace, monospace" font-weight="600" font-size="15" letter-spacing="2" fill="#E8BC4A">COMING SOON</text>
    </g>
    <text x="0" y="150" font-family="Geist, Inter, system-ui, sans-serif" font-weight="800" font-size="82" fill="#FFFFFF">Every point,</text>
    <text x="0" y="242" font-family="Geist, Inter, system-ui, sans-serif" font-weight="800" font-size="82" fill="url(#head)">perfectly used.</text>
    <text x="0" y="312" font-family="Geist, Inter, system-ui, sans-serif" font-weight="500" font-size="26" fill="#FFFFFF" opacity="0.6">Maximize rewards on every card, every purchase.</text>
  </g>
</svg>
