<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#E6F4FE"/>
      <stop offset="0.55" stop-color="#DBEAFE"/>
      <stop offset="1" stop-color="#BFDBFE"/>
    </linearGradient>
    <linearGradient id="card1" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#BFDBFE"/>
      <stop offset="1" stop-color="#93C5FD"/>
    </linearGradient>
    <linearGradient id="card2" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="card3" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#1E40AF"/>
    </linearGradient>
    <linearGradient id="wordmark" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#1E3A5F"/>
      <stop offset="0.5" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#1E3A5F"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#1D4ED8" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle dot grid -->
  <g opacity="0.15" fill="#2563EB">
    <circle cx="100" cy="100" r="2"/>
    <circle cx="200" cy="100" r="2"/>
    <circle cx="300" cy="100" r="2"/>
    <circle cx="1100" cy="100" r="2"/>
    <circle cx="100" cy="530" r="2"/>
    <circle cx="1100" cy="530" r="2"/>
    <circle cx="60" cy="315" r="2"/>
    <circle cx="1140" cy="315" r="2"/>
  </g>

  <!-- Card stack (right side) -->
  <g transform="translate(860 315)" filter="url(#shadow)">
    <g transform="rotate(-12)">
      <rect x="-180" y="-115" width="360" height="230" rx="28" fill="url(#card1)" opacity="0.75"/>
    </g>
    <g transform="rotate(-5) translate(0 -10)">
      <rect x="-180" y="-115" width="360" height="230" rx="28" fill="url(#card2)" opacity="0.9"/>
      <circle cx="-120" cy="-40" r="24" fill="#FFFFFF" opacity="0.3"/>
      <rect x="-145" y="-8" width="50" height="32" rx="4" fill="#FFFFFF" opacity="0.35"/>
    </g>
    <g transform="rotate(2) translate(0 -18)">
      <rect x="-180" y="-115" width="360" height="230" rx="28" fill="url(#card3)"/>
      <rect x="-145" y="-82" width="50" height="36" rx="4" fill="#93C5FD" opacity="0.8"/>
      <rect x="-82" y="-78" width="22" height="26" rx="2" fill="#BFDBFE" opacity="0.6"/>
      <g fill="#FFFFFF" opacity="0.55">
        <circle cx="-132" cy="30" r="6"/>
        <circle cx="-118" cy="30" r="6"/>
        <circle cx="-104" cy="30" r="6"/>
        <circle cx="-90" cy="30" r="6"/>
        <circle cx="-62" cy="30" r="6"/>
        <circle cx="-48" cy="30" r="6"/>
        <circle cx="-34" cy="30" r="6"/>
        <circle cx="-20" cy="30" r="6"/>
        <circle cx="8" cy="30" r="6"/>
        <circle cx="22" cy="30" r="6"/>
        <circle cx="36" cy="30" r="6"/>
        <circle cx="50" cy="30" r="6"/>
        <circle cx="78" cy="30" r="6"/>
        <circle cx="92" cy="30" r="6"/>
        <circle cx="106" cy="30" r="6"/>
        <circle cx="120" cy="30" r="6"/>
      </g>
      <rect x="-140" y="55" width="110" height="8" rx="2" fill="#FFFFFF" opacity="0.45"/>
      <g fill="#FFFFFF" opacity="0.5">
        <circle cx="120" cy="70" r="16"/>
        <circle cx="140" cy="70" r="16"/>
      </g>
    </g>

    <!-- Orbiting diamonds -->
    <g fill="#2563EB">
      <rect x="-6" y="-180" width="12" height="12" transform="rotate(45)" opacity="0.7"/>
      <rect x="-5" y="160" width="10" height="10" transform="rotate(45)" opacity="0.6"/>
      <rect x="-210" y="-5" width="10" height="10" transform="rotate(45)" opacity="0.5"/>
    </g>
  </g>

  <!-- Text block (left) -->
  <g transform="translate(80 230)">
    <rect width="170" height="42" rx="21" fill="#BFDBFE"/>
    <text x="85" y="28" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="18" fill="#1D4ED8" text-anchor="middle">PointStax</text>

    <text x="0" y="140" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="78" fill="#1E3A5F">Every point,</text>
    <text x="0" y="230" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="78" fill="url(#wordmark)">perfectly used.</text>

    <text x="0" y="296" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="26" fill="#1E3A5F" opacity="0.72">Maximize rewards on every card, every purchase.</text>
  </g>
</svg>
